{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  // Suppress intro animations when navigating within the site (not a fresh external load)
  try {
    if (new URL(document.referrer).host === location.host) {
      document.documentElement.classList.add('no-intro');
    }
  } catch(e) {}
</script>

<!-- Web fonts: Inter (UI) + Source Serif 4 (prose) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap" rel="stylesheet">

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<!-- MathJax v3: LaTeX rendering for blog posts -->
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

<script>
  let theme = sessionStorage.getItem('theme');
  if(theme === "dark")
  {
    sessionStorage.setItem('theme', 'dark');
    document.querySelector('html').style.filter = 'invert(100%)';
  }
  else
  {
    sessionStorage.setItem('theme', 'light');
    document.querySelector('html').style.filter = 'invert(0%)';
  }
</script>

<meta http-equiv="cleartype" content="on">
